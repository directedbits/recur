version: '3'

vars:
  BIN_DIR: bin
  GOEXE:
    sh: go env GOEXE
  RECUR_BIN: '{{.BIN_DIR}}/recur{{.GOEXE}}'
  RECURD_BIN: '{{.BIN_DIR}}/recurd{{.GOEXE}}'
  GOPATH:
    sh: go env GOPATH

tasks:
  build:
    desc: Build recur and recurd binaries
    cmds:
      - go build -o {{.RECUR_BIN}} ./src/app/recur
      - go build -o {{.RECURD_BIN}} ./src/app/recurd

  clean:
    desc: Remove build artifacts and generated code
    cmds:
      - task: clean:{{OS}}

  clean:linux:
    internal: true
    cmds:
      - rm -rf {{.BIN_DIR}}
      - rm -f src/infra/grpc/v1/*.pb.go

  clean:darwin:
    internal: true
    cmds:
      - task: clean:linux

  clean:windows:
    internal: true
    cmds:
      - cmd /c "if exist {{.BIN_DIR}} rd /s /q {{.BIN_DIR}}"
      - cmd /c "del /q src\infra\grpc\v1\*.pb.go 2>nul"

  generate:
    desc: Generate protobuf Go code
    dir: api
    cmds:
      - '{{.GOPATH}}/bin/buf generate'

  lint:
    desc: Run all linters (Go + protobuf)
    cmds:
      - task: lint:go
      - task: lint:proto

  lint:go:
    desc: Run golangci-lint over the Go module
    cmds:
      - '{{.GOPATH}}/bin/golangci-lint run ./src/... ./pkg/...'

  lint:proto:
    desc: Lint protobuf definitions
    dir: api
    cmds:
      - '{{.GOPATH}}/bin/buf lint'

  docs:
    desc: Build the docs site with Hugo
    deps: [docs:sync]
    dir: docs
    cmds:
      - hugo mod get
      - hugo --minify

  docs:serve:
    desc: Serve the docs site locally with live reload
    deps: [docs:sync]
    dir: docs
    cmds:
      - hugo mod get
      - hugo server

  docs:sync:
    desc: Mirror source-of-truth READMEs into the Hugo content tree
    cmds:
      - bash scripts/sync-docs.sh

  test:
    desc: Run unit tests
    cmds:
      - go test ./src/... ./pkg/...

  test:e2e:
    desc: Run e2e tests
    cmds:
      - go test ./test/e2e/ -v

  test:all:
    desc: Run all tests (unit + e2e)
    cmds:
      - task: test
      - task: test:e2e

  rebuild:
    desc: Clean, generate, and build from scratch
    cmds:
      - task: clean
      - task: generate
      - task: build

  default:
    desc: Build everything (generate + build)
    cmds:
      - task: generate
      - task: build
