name: docker
namespace: core.docker
version: "0.1.0"
description: "Docker container lifecycle triggers and management actions"

triggers:
  - name: ContainerStarted
    description: "Fires when a container starts"
    options:
      - name: host
        type: string
        default: "unix:///var/run/docker.sock"
        description: "Docker Engine API endpoint (unix socket or tcp://host:port)"
      - name: filter_name
        type: string
        description: "Filter by container name (substring match)"
      - name: filter_image
        type: string
        description: "Filter by image name (substring match)"
      - name: filter_label
        type: string
        description: "Filter by label (key=value)"
    context:
      - name: ContainerID
        type: string
        description: "Full container ID"
      - name: ContainerName
        type: string
        description: "Container name (without leading /)"
      - name: Image
        type: string
        description: "Image name"
      - name: Status
        type: string
        description: "Event status (start, stop, die, etc.)"

  - name: ContainerStopped
    description: "Fires when a container stops or dies"
    options:
      - name: host
        type: string
        default: "unix:///var/run/docker.sock"
        description: "Docker Engine API endpoint"
      - name: filter_name
        type: string
        description: "Filter by container name"
      - name: filter_image
        type: string
        description: "Filter by image name"
      - name: filter_label
        type: string
        description: "Filter by label (key=value)"
    context:
      - name: ContainerID
        type: string
        description: "Full container ID"
      - name: ContainerName
        type: string
        description: "Container name"
      - name: Image
        type: string
        description: "Image name"
      - name: Status
        type: string
        description: "Event status"
      - name: ExitCode
        type: string
        description: "Container exit code (for die events)"

  - name: HealthChanged
    description: "Fires when a container's health status changes"
    options:
      - name: host
        type: string
        default: "unix:///var/run/docker.sock"
        description: "Docker Engine API endpoint"
      - name: filter_name
        type: string
        description: "Filter by container name"
      - name: filter_image
        type: string
        description: "Filter by image name"
    context:
      - name: ContainerID
        type: string
        description: "Full container ID"
      - name: ContainerName
        type: string
        description: "Container name"
      - name: Image
        type: string
        description: "Image name"
      - name: HealthStatus
        type: string
        description: "New health status (healthy, unhealthy, starting)"

actions:
  - name: ContainerStart
    description: "Start a stopped container"
    options:
      - name: host
        type: string
        default: "unix:///var/run/docker.sock"
        description: "Docker Engine API endpoint"
      - name: container
        type: string
        shorthand: true
        description: "Container name or ID to start"

  - name: ContainerStop
    description: "Stop a running container"
    options:
      - name: host
        type: string
        default: "unix:///var/run/docker.sock"
        description: "Docker Engine API endpoint"
      - name: container
        type: string
        shorthand: true
        description: "Container name or ID to stop"
      - name: timeout
        type: string
        default: "10"
        description: "Seconds to wait before killing"

  - name: ContainerRestart
    description: "Restart a container"
    options:
      - name: host
        type: string
        default: "unix:///var/run/docker.sock"
        description: "Docker Engine API endpoint"
      - name: container
        type: string
        shorthand: true
        description: "Container name or ID to restart"
      - name: timeout
        type: string
        default: "10"
        description: "Seconds to wait before killing"
