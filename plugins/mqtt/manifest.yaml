name: mqtt
namespace: core.mqtt
version: "0.1.0"
description: "MQTT messaging — subscribe to topics (trigger) and publish messages (action)"

triggers:
  - name: MessageReceived
    description: "Fires when an MQTT message arrives on a subscribed topic"
    options:
      - name: broker
        type: string
        description: "Broker URL (e.g. tcp://localhost:1883)"
      - name: topic
        type: string
        description: "Topic filter (supports + and # wildcards)"
      - name: qos
        type: string
        default: "0"
        description: "QoS level (0, 1, or 2)"
      - name: username
        type: string
        description: "Username for authentication"
      - name: password
        type: string
        sensitive: true
        description: "Password or token for authentication"
      - name: client_id
        type: string
        description: "Client ID (auto-generated if omitted)"
      - name: clean_session
        type: string
        default: "true"
        description: "Start with a clean session"
      - name: keepalive
        type: string
        default: "30"
        description: "Keepalive interval in seconds"
    context:
      - name: Topic
        type: string
        description: "Topic the message was received on"
      - name: Payload
        type: string
        description: "Message payload as string"
      - name: QoS
        type: string
        description: "QoS level of the received message"
      - name: Retained
        type: string
        description: "Whether the message was retained"
      - name: MessageID
        type: string
        description: "Message ID (for QoS 1/2)"

actions:
  - name: Publish
    description: "Publish a message to an MQTT topic"
    options:
      - name: broker
        type: string
        description: "Broker URL (e.g. tcp://localhost:1883)"
      - name: topic
        type: string
        shorthand: true
        description: "Topic to publish to"
      - name: payload
        type: string
        default: ""
        description: "Message payload"
      - name: qos
        type: string
        default: "0"
        description: "QoS level (0, 1, or 2)"
      - name: retain
        type: string
        default: "false"
        description: "Retain the message on the broker"
      - name: username
        type: string
        description: "Username for authentication"
      - name: password
        type: string
        sensitive: true
        description: "Password or token for authentication"
      - name: client_id
        type: string
        description: "Client ID (auto-generated if omitted)"
