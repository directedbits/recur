name: fileevents
namespace: core.fileevents
version: "1.0.0"
description: "File system event triggers powered by fsnotify/fsbroker"

triggers:
  - name: FileCreated
    description: "Fires when a file or directory is created"
    options:
      - name: path
        type: string
        default: ""
        description: "Directory to watch. Defaults to the recurfile's directory."
      - name: recursive
        type: bool
        default: false
        description: "Watch subdirectories"
      - name: filter
        type: list
        default: []
        description: "Glob patterns to match"
      - name: ignore_hidden
        type: bool
        default: true
        description: "Ignore hidden files (dotfiles)"
      - name: ignore_system
        type: bool
        default: true
        description: "Ignore system/OS-generated files"
      - name: entity_type
        type: string
        default: "file"
        description: "Entity type to watch: file, directory, or all"
      - name: exclude_paths
        type: list
        default: []
        description: |
          Glob patterns (doublestar dialect; `**` supported) of paths to
          exclude. A leading `~/` is expanded to the user's home; event paths
          are matched as absolute, slash-normalized strings.

          Defaults: ["~/.config/recur/**"] plus an unconditional filter on
          any file whose basename is a Recurfile (case-insensitive, with
          optional .yaml or .yml extension).

          Setting this option in daemon config
          (plugins.core.fileevents.exclude_paths) replaces the defaults
          entirely. Setting it only in a Recurfile (without a daemon-config
          value) is additive to the defaults. Pass [] at either level to
          drop defaults without adding anything.
    context:
      - name: FilePath
        type: string
        description: "Path of the created entity"
      - name: IsDirectory
        type: bool
        description: "Whether the entity is a directory"
      - name: TriggeredOn
        type: string
        description: "ISO 8601 timestamp of the event"

  - name: FileModified
    description: "Fires when a file's content is modified"
    options:
      - name: path
        type: string
        default: ""
        description: "Directory to watch. Defaults to the recurfile's directory."
      - name: recursive
        type: bool
        default: false
        description: "Watch subdirectories"
      - name: filter
        type: list
        default: []
        description: "Glob patterns to match"
      - name: ignore_hidden
        type: bool
        default: true
        description: "Ignore hidden files (dotfiles)"
      - name: ignore_system
        type: bool
        default: true
        description: "Ignore system/OS-generated files"
      - name: entity_type
        type: string
        default: "file"
        description: "Entity type to watch: file, directory, or all"
      - name: exclude_paths
        type: list
        default: []
        description: |
          Glob patterns (doublestar dialect; `**` supported) of paths to
          exclude. A leading `~/` is expanded to the user's home; event paths
          are matched as absolute, slash-normalized strings.

          Defaults: ["~/.config/recur/**"] plus an unconditional filter on
          any file whose basename is a Recurfile (case-insensitive, with
          optional .yaml or .yml extension).

          Setting this option in daemon config
          (plugins.core.fileevents.exclude_paths) replaces the defaults
          entirely. Setting it only in a Recurfile (without a daemon-config
          value) is additive to the defaults. Pass [] at either level to
          drop defaults without adding anything.
    context:
      - name: FilePath
        type: string
        description: "Path of the modified entity"
      - name: IsDirectory
        type: bool
        description: "Whether the entity is a directory"
      - name: TriggeredOn
        type: string
        description: "ISO 8601 timestamp of the event"

  - name: FileDeleted
    description: "Fires when a file or directory is deleted"
    options:
      - name: path
        type: string
        default: ""
        description: "Directory to watch. Defaults to the recurfile's directory."
      - name: recursive
        type: bool
        default: false
        description: "Watch subdirectories"
      - name: filter
        type: list
        default: []
        description: "Glob patterns to match"
      - name: ignore_hidden
        type: bool
        default: true
        description: "Ignore hidden files (dotfiles)"
      - name: ignore_system
        type: bool
        default: true
        description: "Ignore system/OS-generated files"
      - name: entity_type
        type: string
        default: "file"
        description: "Entity type to watch: file, directory, or all"
      - name: exclude_paths
        type: list
        default: []
        description: |
          Glob patterns (doublestar dialect; `**` supported) of paths to
          exclude. A leading `~/` is expanded to the user's home; event paths
          are matched as absolute, slash-normalized strings.

          Defaults: ["~/.config/recur/**"] plus an unconditional filter on
          any file whose basename is a Recurfile (case-insensitive, with
          optional .yaml or .yml extension).

          Setting this option in daemon config
          (plugins.core.fileevents.exclude_paths) replaces the defaults
          entirely. Setting it only in a Recurfile (without a daemon-config
          value) is additive to the defaults. Pass [] at either level to
          drop defaults without adding anything.
    context:
      - name: FilePath
        type: string
        description: "Path of the deleted entity"
      - name: IsDirectory
        type: bool
        description: "Whether the entity is a directory"
      - name: PermanentlyDeleted
        type: bool
        description: "True if permanently deleted, false if moved to trash/recycle bin. Accuracy is platform-dependent."
      - name: TriggeredOn
        type: string
        description: "ISO 8601 timestamp of the event"

  - name: FileMoved
    description: "Fires when a file or directory is renamed or moved"
    options:
      - name: path
        type: string
        default: ""
        description: "Directory to watch. Defaults to the recurfile's directory."
      - name: recursive
        type: bool
        default: false
        description: "Watch subdirectories"
      - name: filter
        type: list
        default: []
        description: "Glob patterns to match"
      - name: ignore_hidden
        type: bool
        default: true
        description: "Ignore hidden files (dotfiles)"
      - name: ignore_system
        type: bool
        default: true
        description: "Ignore system/OS-generated files"
      - name: entity_type
        type: string
        default: "file"
        description: "Entity type to watch: file, directory, or all"
      - name: exclude_paths
        type: list
        default: []
        description: |
          Glob patterns (doublestar dialect; `**` supported) of paths to
          exclude. A leading `~/` is expanded to the user's home; event paths
          are matched as absolute, slash-normalized strings.

          Defaults: ["~/.config/recur/**"] plus an unconditional filter on
          any file whose basename is a Recurfile (case-insensitive, with
          optional .yaml or .yml extension).

          Setting this option in daemon config
          (plugins.core.fileevents.exclude_paths) replaces the defaults
          entirely. Setting it only in a Recurfile (without a daemon-config
          value) is additive to the defaults. Pass [] at either level to
          drop defaults without adding anything.
    context:
      - name: From
        type: string
        description: "Original path. May not always be available depending on platform — fsnotify only provides the new name on some systems."
      - name: To
        type: string
        description: "New path"
      - name: IsDirectory
        type: bool
        description: "Whether the entity is a directory"
      - name: TriggeredOn
        type: string
        description: "ISO 8601 timestamp of the event"
