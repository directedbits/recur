name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: "386"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.66.0"

      - name: Generate protobuf
        working-directory: api
        run: buf generate

      - name: Set artifact name
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            SUFFIX="${SUFFIX}v${{ matrix.goarm }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "artifact=recur-${TAG}-${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Build core binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          OUTDIR="dist/${{ steps.vars.outputs.artifact }}"
          mkdir -p "$OUTDIR"
          EXT="${{ matrix.ext }}"
          LDFLAGS="-X github.com/directedbits/recur/src/app/cli.Version=${{ steps.vars.outputs.tag }}"
          go build -ldflags "$LDFLAGS" -o "$OUTDIR/recur${EXT}" ./src/app/recur
          go build -ldflags "$LDFLAGS" -o "$OUTDIR/recurd${EXT}" ./src/app/recurd

      - name: Build plugins
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          OUTDIR="dist/${{ steps.vars.outputs.artifact }}/plugins"
          PLUGINS="calendar docker mqtt timer webhook"
          if [ "${{ matrix.goos }}" = "linux" ] || [ "${{ matrix.goos }}" = "windows" ]; then
            PLUGINS="$PLUGINS devicemonitor"
          fi
          for plugin in $PLUGINS; do
            mkdir -p "$OUTDIR/$plugin"
            EXT="${{ matrix.ext }}"
            go build -o "$OUTDIR/$plugin/${plugin}${EXT}" "./plugins/$plugin/"
            cp "./plugins/$plugin/manifest.yaml" "$OUTDIR/$plugin/"
          done

      - name: Smoke test (linux-amd64 only)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          OUTDIR="dist/${{ steps.vars.outputs.artifact }}"
          "$OUTDIR/recur" version
          "$OUTDIR/recur" config get

      - name: Report binary sizes
        run: |
          OUTDIR="dist/${{ steps.vars.outputs.artifact }}"
          echo "### Binary sizes (${{ steps.vars.outputs.suffix }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -lh "$OUTDIR/recur" "$OUTDIR/recurd" >> "$GITHUB_STEP_SUMMARY"
          for f in "$OUTDIR"/plugins/*/; do
            plugin=$(basename "$f")
            ls -lh "$f$plugin" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Create tarball
        run: |
          cd dist
          tar czf "${{ steps.vars.outputs.artifact }}.tar.gz" "${{ steps.vars.outputs.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.artifact }}
          path: dist/${{ steps.vars.outputs.artifact }}.tar.gz

  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: vars
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          git archive --format=tar.gz --prefix="recur-${{ steps.vars.outputs.tag }}/" \
            -o "recur-${{ steps.vars.outputs.tag }}-source.tar.gz" HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: recur-${{ steps.vars.outputs.tag }}-source
          path: recur-${{ steps.vars.outputs.tag }}-source.tar.gz

  release:
    needs: [build, source]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # required for cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate sha256 checksums
        id: vars
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          cd artifacts
          sha256sum *.tar.gz > "recur-${TAG}-checksums.txt"
          cat "recur-${TAG}-checksums.txt"

      - uses: sigstore/cosign-installer@v3

      - name: Sign checksums (cosign keyless via GitHub OIDC)
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          cd artifacts
          cosign sign-blob --yes \
            --bundle "recur-${TAG}-checksums.txt.cosign.bundle" \
            "recur-${TAG}-checksums.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/recur-*-checksums.txt
            artifacts/recur-*-checksums.txt.cosign.bundle
          generate_release_notes: true

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: packaging/homebrew

      - uses: actions/checkout@v4
        with:
          repository: directedbits/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Compute release sha256s
        id: sums
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          base="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          for plat in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            curl -sSfL -o "${plat}.tar.gz" "${base}/recur-${TAG}-${plat}.tar.gz"
            sum=$(sha256sum "${plat}.tar.gz" | awk '{print $1}')
            # Normalize plat (dashes -> underscores) for env var name
            var="SHA256_$(echo "$plat" | tr 'a-z-' 'A-Z_')"
            echo "${var}=${sum}" >> "$GITHUB_ENV"
          done

      - name: Render formula from template
        env:
          VERSION: ${{ steps.sums.outputs.version }}
        run: |
          mkdir -p tap/Formula
          envsubst < packaging/homebrew/recur.rb.template > tap/Formula/recur.rb

      - name: Commit and push to tap
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/recur.rb
          if git diff --cached --quiet; then
            echo "No formula changes."
            exit 0
          fi
          git commit -m "recur ${{ steps.sums.outputs.version }}"
          git push
