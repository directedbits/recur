name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  protobuf:
    name: Protobuf up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.66.0"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf
        working-directory: api
        run: buf generate

      - name: Check generated protobuf is committed
        run: |
          if ! git diff --exit-code -- 'src/infra/grpc/**/*.pb.go'; then
            echo "::error::Generated protobuf is out of date. Run 'cd api && buf generate' and commit the result."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.66.0"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf
        working-directory: api
        run: buf generate

      - name: Unit tests
        run: go test ./src/...

      - name: Plugin tests
        run: go test ./plugins/calendar/... ./plugins/devicemonitor/... ./plugins/docker/... ./plugins/mqtt/... ./plugins/timer/... ./plugins/webhook/...

      - name: Build binaries
        run: |
          go build -o bin/recur ./src/app/recur
          go build -o bin/recurd ./src/app/recurd

      - name: E2E tests
        run: go test ./test/e2e/ -timeout 300s

      - name: Cross-compile for macOS
        run: |
          GOOS=darwin GOARCH=arm64 go build ./src/...
          GOOS=darwin GOARCH=amd64 go build ./src/...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.66.0"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf
        working-directory: api
        run: buf generate

      - name: Check coverage threshold
        run: bash scripts/check-coverage.sh 75
