name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'plugins/*/README.md'
      - 'examples/*/README.md'
      - '.github/CONTRIBUTING.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Sync source READMEs into docs content
        run: bash scripts/sync-docs.sh

      - name: Build
        working-directory: docs
        run: |
          hugo mod get
          hugo --minify --baseURL "https://directedbits.github.io/recur/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  cleanup:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      # Artifact cleanup: always runs. The github-pages artifact is
      # consumed by actions/deploy-pages and isn't needed afterward;
      # deleting it keeps the Actions storage quota in check.
      - name: Artifact cleanup
        if: always()
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            github-pages
          failOnError: false
