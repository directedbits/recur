name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `recur version`
      placeholder: "0.1.0-alpha"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (recur)
        - Daemon (recurd)
        - Timer plugin
        - Webhook plugin
        - MQTT plugin
        - Calendar plugin
        - Device Monitor plugin
        - Configuration
        - Recurfile parsing
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Create a recurfile with ...
        2. Run `recur register recur.yaml`
        3. Run `recur list triggers`
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant daemon or CLI output. Runs in a code block automatically.
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, init system, anything relevant.
      placeholder: |
        - OS: Ubuntu 24.04 (WSL2)
        - Go: 1.26.0
        - Init: systemd
