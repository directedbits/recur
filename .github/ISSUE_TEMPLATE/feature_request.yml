name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? Why does the current behavior fall short?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? CLI examples, config snippets, or rough API sketches are helpful.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they don't work as well.

  - type: dropdown
    id: component
    attributes:
      label: Area
      options:
        - CLI
        - Daemon
        - Plugin system
        - Recurfile format
        - Configuration
        - Documentation
        - Other
